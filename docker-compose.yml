version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flexpay-postgres
    environment:
      POSTGRES_USER: flexpay
      POSTGRES_PASSWORD: securepass
      POSTGRES_DB: flexpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flexpay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: flexpay-redis-insight
    ports:
      - "8001:8001"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
